pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,jsx,ts,tsx,css,json}"
      run: |
        bunx prettier --write --ignore-unknown {staged_files}
        git add {staged_files}
      skip:
        - merge
        - rebase
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: |
        bunx eslint {staged_files}
        git add {staged_files}
      skip:
        - merge
        - rebase
    stylelint:
      glob: "*.{css}"
      run: |
        stylelint --fix {staged_files}
        git add {staged_files}
      skip:
        - merge
        - rebase